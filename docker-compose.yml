version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: traffic_mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: traffic_db
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
  web:
      build: .
      container_name: traffic_fastapi_web
      restart: always
      ports:
        - "8000:8000"
      volumes:
        - .:/app
      env_file:
        - .env
      depends_on:
        - db
volumes:
  mysql_data:

  
